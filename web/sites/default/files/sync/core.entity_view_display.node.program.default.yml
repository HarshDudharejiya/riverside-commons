langcode: en
status: true
dependencies:
  config:
    - field.field.node.program.body
    - field.field.node.program.field_category
    - field.field.node.program.field_class_size
    - field.field.node.program.field_date_range
    - field.field.node.program.field_image
    - field.field.node.program.field_instructor_details
    - field.field.node.program.field_level
    - field.field.node.program.field_location
    - field.field.node.program.field_member_price_note
    - field.field.node.program.field_price_member
    - field.field.node.program.field_price_standard
    - field.field.node.program.field_schedule
    - field.field.node.program.field_sessions
    - field.field.node.program.field_subtitle_intro
    - field.field.node.program.field_what_s_included
    - field.field.node.program.field_what_you_ll_learn
    - node.type.program
  module:
    - image
    - text
id: node.program.default
targetEntityType: node
bundle: program
mode: default
content:
  field_image:
    type: image
    label: hidden
    settings:
      image_style: program_detail_hero
      image_link: ''
    third_party_settings: {}
    weight: 1
    region: content

# Every other field on this view mode is hidden from the generic
# {{ content }} render array on purpose: riverside_commons_preprocess_node()
# builds a `program` variable (meta line, price block, instructor render
# array, learn/included lists, schedule text) that node--program--full.html.twig
# prints directly, because the display logic (member-vs-standard price,
# schedule fallback, instructor lookup) can't be expressed by stock field
# formatters. Only field_image is left as a real field formatter since
# preprocess reads the image style through it rather than duplicating it.
hidden:
  body: true
  field_category: true
  field_class_size: true
  field_date_range: true
  field_instructor_details: true
  field_level: true
  field_location: true
  field_member_price_note: true
  field_price_member: true
  field_price_standard: true
  field_schedule: true
  field_sessions: true
  field_subtitle_intro: true
  field_what_s_included: true
  field_what_you_ll_learn: true
  langcode: true
  links: true
